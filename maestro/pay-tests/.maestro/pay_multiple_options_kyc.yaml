appId: ${APP_ID}
name: WalletConnect Pay - Multiple Payment Options with KYC
tags:
  - pay
  - pay-needs-kyc-backend
---
# Create payment via API (multi-option, KYC merchant)
- runScript:
    file: scripts/create-payment.js
    env:
      WPAY_CUSTOMER_KEY: ${WPAY_CUSTOMER_KEY_MULTI_KYC}
      WPAY_MERCHANT_ID: ${WPAY_MERCHANT_ID_MULTI_KYC}

- clearState

- startRecording: "Pay - Multiple Payment Options with KYC"

# Open wallet, paste payment URL
- runFlow:
    file: flows/pay_open_and_paste_url.yaml

# Wait for payment options to load
- extendedWaitUntil:
    visible:
      id: "pay-select-option-header"
    timeout: 30000

# Verify first option exists
- assertVisible:
    id: "pay-option-0"

# Verify at least a second option exists (multiple options)
- assertVisible:
    id: "pay-option-1"

# Verify info-required marker is visible on KYC options
- assertVisible:
    id: "pay-option-info-required"

# Select the second option (index 1)
- copyTextFrom:
    id: "pay-option-1"
- tapOn:
    id: "pay-option-1"

# Handle personal details webview (KYC). The /collect form is now a single
# inline page (no confirmation dialog): fields are autocompleted, tick the
# inline consent checkbox, then Confirm submits directly.
- extendedWaitUntil:
    visible: "Add your personal details"
    timeout: 30000

# Scroll to the bottom of the form so the consent control and the Confirm
# button are both on screen (tapOn does not auto-scroll).
- scrollUntilVisible:
    element:
      text: "I agree"
    direction: DOWN
    timeout: 10000

# Tick consent (Confirm is disabled until checked). The checkbox surfaces as a
# value node reading "0" (unchecked) that flips to "1" when tapped — a more
# reliable target than the "I agree" text, which also appears in the consent
# paragraph. retryTapIfNoChange re-taps only if the value didn't flip.
- tapOn:
    text: "0"
    retryTapIfNoChange: true

# Submit directly — the "Confirm your details" dialog no longer exists, so
# "Confirm" is now unambiguous.
- tapOn:
    text: "Confirm"
    retryTapIfNoChange: true

# Verify review screen shows the same token we selected
- assertVisible:
    id: "pay-review-token-${maestro.copiedText}"

# Verify pay button shows the correct amount
- copyTextFrom:
    id: "pay-button-pay"
- assertTrue:
    condition: "${maestro.copiedText.startsWith('Pay $')}"

# Tap Pay, verify success
- runFlow:
    file: flows/pay_confirm_and_verify.yaml

- stopRecording
