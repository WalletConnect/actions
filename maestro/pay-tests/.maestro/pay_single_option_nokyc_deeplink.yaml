appId: ${APP_ID}
name: WalletConnect Pay - Single Option No KYC (Universal Link)
tags:
  - pay
---
# Create payment via API (single-option, no-KYC merchant)
- runScript:
    file: scripts/create-payment.js
    env:
      WPAY_CUSTOMER_KEY: ${WPAY_CUSTOMER_KEY_SINGLE_NOKYC}
      WPAY_MERCHANT_ID: ${WPAY_MERCHANT_ID_SINGLE_NOKYC}

# NOTE: Do NOT add `clearState` here. Unlike the other flows, this one enters
# via a Universal Link (openLink), and clearState reinstalls the app into a
# fresh container. On iOS that reinstall makes swcd flag "app PI changed",
# downgrade the previously-approved pay.walletconnect.com association to
# `sa = unspecified`, and kick off async re-verification. openLink fires
# ~0.7s later — inside that invalidation window — so iOS finds no match and
# routes the https:// link to Safari instead of the wallet, failing on
# pay-merchant-info. Re-approval lands ~24s later, long after the timeout.
# The cold start this flow needs is already provided by stopApp + openLink in
# flows/pay_open_via_deeplink.yaml, so no reinstall is required.

- startRecording: "Pay - Single Option No KYC (Universal Link)"

# Open wallet via deep link with payment URL
- runFlow:
    file: flows/pay_open_via_deeplink.yaml

# Wait for payment options to load.
#
# Higher timeout than the paste-URL flows because this is the only
# cold-start path in the suite: pay_open_via_deeplink.yaml does
# stopApp + openLink, so the wallet's first sign of life is the OS
# routing the Android intent into a fresh process — ActivityManager
# fork, Hermes init, RN bridge, deep-link router, then the API call.
# On a contended CI emulator the new process can take 20-30s to
# attach (sometimes failing with `Process ... failed to attach` and
# requiring re-fork), which left the 30s budget consistently tight
# (pay-core run 26570588681).
- extendedWaitUntil:
    visible:
      id: "pay-merchant-info"
    timeout: 60000

# Single option auto-selects — go straight to review screen

# Verify pay button shows the correct amount
- extendedWaitUntil:
    visible:
      id: "pay-button-pay"
    timeout: 10000
- copyTextFrom:
    id: "pay-button-pay"
- assertTrue:
    condition: "${maestro.copiedText.startsWith('Pay $')}"

# Tap Pay, verify success
- runFlow:
    file: flows/pay_confirm_and_verify.yaml

- stopRecording
