appId: ${APP_ID}
name: WalletConnect Pay - Single Option No KYC (Universal Link)
tags:
  - pay
---
# Create payment via API (single-option, no-KYC merchant)
- runScript:
    file: scripts/create-payment.js
    env:
      WPAY_CUSTOMER_KEY: ${WPAY_CUSTOMER_KEY_SINGLE_NOKYC}
      WPAY_MERCHANT_ID: ${WPAY_MERCHANT_ID_SINGLE_NOKYC}

# NOTE: Do NOT add `clearState` here — it reinstalls the app, which on iOS
# invalidates the pay.walletconnect.com Universal Link approval and routes
# openLink to Safari. The cold start is already handled by stopApp + openLink
# in flows/pay_open_via_deeplink.yaml.

- startRecording: "Pay - Single Option No KYC (Universal Link)"

# Open wallet via deep link. Shared flow retries until pay-merchant-info is visible.
- runFlow:
    file: flows/pay_open_via_deeplink.yaml

# Single option auto-selects — go straight to review screen

# Verify pay button shows the correct amount
- extendedWaitUntil:
    visible:
      id: "pay-button-pay"
    timeout: 10000
- copyTextFrom:
    id: "pay-button-pay"
- assertTrue:
    condition: "${maestro.copiedText.startsWith('Pay $')}"

# Tap Pay, verify success
- runFlow:
    file: flows/pay_confirm_and_verify.yaml

- stopRecording
