appId: ${APP_ID}
name: WalletConnect Pay - Check Back/Close Buttons in KYC Webview
tags:
  - pay
---
# Create payment via API (multi-option, KYC merchant)
- runScript:
    file: scripts/create-payment.js
    env:
      WPAY_CUSTOMER_KEY: ${WPAY_CUSTOMER_KEY_MULTI_KYC}
      WPAY_MERCHANT_ID: ${WPAY_MERCHANT_ID_MULTI_KYC}

# Wipe app data so this flow starts from a clean, cold state regardless of
# what the previous flow in the run left behind (clearState force-stops the
# app, so the launchApp inside the shared flow is a true cold start).
- clearState

- startRecording: "Pay - Check Back/Close Buttons in KYC Webview"

# Open wallet, paste payment URL
- runFlow:
    file: flows/pay_open_and_paste_url.yaml

# Wait for payment options to load
- extendedWaitUntil:
    visible:
      id: "pay-select-option-header"
    timeout: 30000

# Verify first option exists
- assertVisible:
    id: "pay-option-0"

# Tap the first option to go to collectData webview
- tapOn:
    id: "pay-option-0"

# Wait for KYC webview to load
- extendedWaitUntil:
    visible: "Add your personal details"
    timeout: 30000

# Verify the close button (X) is visible in the header
- assertVisible:
    id: "pay-button-close"

# Verify the back button is visible
- assertVisible:
    id: "pay-button-back"

# Tap back to return to option selection
- tapOn:
    id: "pay-button-back"

# Verify we're back at the selectOption view
- extendedWaitUntil:
    visible:
      id: "pay-option-0"
    timeout: 10000

# Dismiss the modal
- tapOn:
    id: "pay-button-close"

# Verify modal is dismissed and we're back at the main wallet screen
- extendedWaitUntil:
    visible:
      id: "button-scan"
    timeout: 10000

- stopRecording
