appId: ${APP_ID}
name: WalletConnect Pay - USDT on Polygon (Permit2 approve + pay)
tags:
  - pay
  - pay-usdt-polygon
  # Broadcasts on-chain txs (Permit2 approve + payment) -> shares the test
  # wallet's nonce, so the web CI leg keeps pay-onchain flows serial.
  - pay-onchain
---
# Create payment via API (merchant that offers USDT on Polygon).
- runScript:
    file: scripts/create-payment.js
    env:
      WPAY_CUSTOMER_KEY: ${WPAY_CUSTOMER_KEY_MULTI_NOKYC}
      WPAY_MERCHANT_ID: ${WPAY_MERCHANT_ID_MULTI_NOKYC}

- clearState

- startRecording: "Pay - USDT on Polygon"

# Open wallet, paste payment URL, wait for options
- runFlow:
    file: flows/pay_open_and_paste_url.yaml

- extendedWaitUntil:
    visible:
      id: "pay-select-option-header"
    timeout: 30000

# Swipe to reveal the USDT-on-Polygon option, then select it by its
# network+token testID (the merchant lists USDT on other networks too).
- swipe:
    direction: UP
- tapOn:
    id: "pay-option-usdt-polygon"

- assertVisible:
    id: "pay-review-token-polygon"

- copyTextFrom:
    id: "pay-button-pay"
- assertTrue:
    condition: "${maestro.copiedText.startsWith('Pay $')}"

# USDT on Polygon is a Permit2 token: the wallet sends approve() then payment().
- tapOn:
    id: "pay-button-pay"

# Best-effort capture of the approve step (only shown while allowance is 0).
- runFlow:
    when:
      visible:
        id: "pay-loading-setup-note"
    commands:
      - takeScreenshot: usdt-permit2-approve-setup

# Success screen (generous timeout: two on-chain txs).
- extendedWaitUntil:
    visible:
      id: "pay-result-success-icon"
    timeout: 90000

- tapOn:
    id: "pay-button-result-action-success"

- extendedWaitUntil:
    visible:
      id: "button-scan"
    timeout: 10000

- stopRecording
