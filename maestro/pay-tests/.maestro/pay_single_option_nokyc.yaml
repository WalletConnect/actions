appId: ${APP_ID}
name: WalletConnect Pay - Single Payment Option without KYC
tags:
  - pay
  # On-chain: broadcasts a payment tx on Base. The web CI leg buckets on-chain
  # flows by chain (same chain = serial nonce; different chains run concurrently).
  - pay-onchain
  - pay-chain-base
---
# Create payment via API (single-option, no-KYC merchant)
- runScript:
    file: scripts/create-payment.js
    env:
      WPAY_CUSTOMER_KEY: ${WPAY_CUSTOMER_KEY_SINGLE_NOKYC}
      WPAY_MERCHANT_ID: ${WPAY_MERCHANT_ID_SINGLE_NOKYC}

- clearState

- startRecording: "Pay - Single Payment Option without KYC"

# Open wallet, paste payment URL
- runFlow:
    file: flows/pay_open_and_paste_url.yaml

# Wait for payment options to load
- extendedWaitUntil:
    visible:
      id: "pay-merchant-info"
    timeout: 30000

# Single option auto-selects — go straight to review screen

# Verify pay button shows the correct amount
- extendedWaitUntil:
    visible:
      id: "pay-button-pay"
    timeout: 10000
- copyTextFrom:
    id: "pay-button-pay"
- assertTrue:
    condition: "${maestro.copiedText.startsWith('Pay $')}"

# Tap Pay, verify success
- runFlow:
    file: flows/pay_confirm_and_verify.yaml

# Verify payment dialog is dismissed and we're back at the main wallet screen
- extendedWaitUntil:
    visible:
      id: "button-scan"
    timeout: 10000

- stopRecording
