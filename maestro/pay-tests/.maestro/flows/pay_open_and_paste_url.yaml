appId: ${APP_ID}
---
# Shared flow: Launch wallet, open scanner, paste payment URL, wait for merchant info
# Requires: ${output.gateway_url} to be set by a prior runScript step

# Launch wallet app, retrying the launch if it gets killed mid-startup
# by a stale-task teardown (stopApp clears the prior task first).
#
# Each attempt waits for a full cold start: launchApp follows a
# `clearState`/stopApp force-stop, so it triggers ActivityManager fork,
# attach to system_server, APK load, Hermes init, RN bridge, JS bundle,
# home screen render. On a contended CI emulator the first fork can hit
# `ActivityManager: Process ... failed to attach`, ActivityManager
# re-forks, and total time-to-render becomes ~30-40s. The per-attempt
# wait was bumped 20s → 90s (#98) because the re-fork consistently
# hadn't finished rendering inside 20s on pay-core CD runs — every
# attempt timed out at exactly 20s on a black screen.
- retry:
    maxRetries: 3
    commands:
      - stopApp:
          appId: ${APP_ID}
      - launchApp:
          appId: ${APP_ID}
          permissions:
            all: allow
      - extendedWaitUntil:
          visible:
            id: "button-scan"
          timeout: 90000

# Tap scan button to open scanner options modal
- tapOn:
    id: "button-scan"

# Type the payment URL into the test input field
- tapOn:
    id: "input-paste-url"

# Dismiss iOS keyboard language prompt if it appears
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"

- inputText: ${output.gateway_url}

- pressKey: Enter

- extendedWaitUntil:
    visible:
      id: "button-submit-url"
    timeout: 10000

- tapOn:
    id: "button-submit-url"
