appId: ${APP_ID}
name: WalletConnect Pay - Cancel from KYC Webview
tags:
  - pay
  - pay-needs-kyc-backend
---
# Create payment via API (multi-option, KYC merchant)
- runScript:
    file: scripts/create-payment.js
    env:
      WPAY_CUSTOMER_KEY: ${WPAY_CUSTOMER_KEY_MULTI_KYC}
      WPAY_MERCHANT_ID: ${WPAY_MERCHANT_ID_MULTI_KYC}

- clearState

- startRecording: "Pay - Cancel from KYC Webview"

# Open wallet, paste payment URL
- runFlow:
    file: flows/pay_open_and_paste_url.yaml

# Wait for payment options to load
- extendedWaitUntil:
    visible:
      id: "pay-select-option-header"
    timeout: 30000

# Verify first option exists
- assertVisible:
    id: "pay-option-0"

# Tap the first option to go to collectData webview
- tapOn:
    id: "pay-option-0"

# Wait for KYC webview to load
- extendedWaitUntil:
    visible: "Add your personal details"
    timeout: 30000

# Cancel the payment server-side while in KYC webview
- runScript:
    file: scripts/cancel-payment.js
    env:
      WPAY_CUSTOMER_KEY: ${WPAY_CUSTOMER_KEY_MULTI_KYC}
      WPAY_MERCHANT_ID: ${WPAY_MERCHANT_ID_MULTI_KYC}
      PAYMENT_ID: ${output.payment_id}

# Complete the redesigned inline IC form: tick consent, then Confirm submits.
# Scroll to the bottom so the consent control and the Confirm button are both
# on screen (tapOn does not auto-scroll), then tap "I agree" to enable Confirm.
- scrollUntilVisible:
    element:
      text: "Confirm"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: "I agree"
    retryTapIfNoChange: true
# "Confirm your details" dialog is gone, so "Confirm" is now unambiguous.
- tapOn:
    text: "Confirm"
    retryTapIfNoChange: true

# Wait for result screen
- extendedWaitUntil:
    visible:
      id: "pay-result-container"
    timeout: 30000

# Verify cancelled icon
- assertVisible:
    id: "pay-result-cancelled-icon"

# Verify action button
- assertVisible:
    id: "pay-button-result-action-cancelled"

# Dismiss
- tapOn:
    id: "pay-button-result-action-cancelled"

- stopRecording
