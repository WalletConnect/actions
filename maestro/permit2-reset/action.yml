name: Permit2 Allowance Reset
description: |
  Reset an ERC-20 token's Permit2 allowance back to 0 (sends approve(PERMIT2, 0)).
  Used after Permit2 pay tests so the next run re-exercises the on-chain approve
  step. This is a real Node step that signs a transaction — it cannot run inside
  Maestro's runScript sandbox. The private key is read from the
  PERMIT2_REVOKE_PRIVATE_KEY env var, so it is never placed on the command line
  (which would expose it in the runner's process list).

inputs:
  chain-id:
    description: 'CAIP-2 or numeric chain id (e.g. eip155:137 or 137).'
    required: true
  rpc-url:
    description: |
      RPC URL to use. Recommended over the WalletConnect Blockchain API for chains
      where it gates methods (e.g. Arbitrum eth_blockNumber). For Polygon, avoid
      polygon-rpc.com (gated, HTTP 401 in CI) — e.g. https://polygon-bor-rpc.publicnode.com.
    required: true
  private-key:
    description: |
      Test wallet private key. Passed to the script via the
      PERMIT2_REVOKE_PRIVATE_KEY env var (never on the CLI).
    required: true
  token-address:
    description: 'ERC-20 token address. Optional — defaults to the known USDT address for the chain.'
    required: false
    default: ''
  min-priority-fee-gwei:
    description: 'Override the min priority fee (gwei). Optional.'
    required: false
    default: ''
  fail-on-error:
    description: |
      When 'false', a revoke failure (RPC error, insufficient gas, etc.) logs a
      warning and exits 0 instead of failing the job. Best-effort cleanup callers
      (post-test allowance reset) should set this to 'false'. Default 'true' keeps
      strict behavior. Needed because `continue-on-error` on a step that `uses:`
      this composite action is ignored by the runner (actions/runner#1457).
    required: false
    default: 'true'
  node-version:
    description: 'Node.js version used to run the helper.'
    required: false
    default: '22'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install deps
      shell: bash
      working-directory: ${{ github.action_path }}
      # npm install (not npm ci): this folder ships no lockfile; ethers is pinned in package.json.
      run: npm install --no-audit --no-fund --silent

    - name: Revoke Permit2 allowance
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        PERMIT2_REVOKE_PRIVATE_KEY: ${{ inputs.private-key }}
        CHAIN_ID: ${{ inputs.chain-id }}
        RPC_URL: ${{ inputs.rpc-url }}
        TOKEN_ADDRESS: ${{ inputs.token-address }}
        MIN_PRIORITY_FEE_GWEI: ${{ inputs.min-priority-fee-gwei }}
        FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      # set +e: GitHub's default `bash -e` would abort on a node failure before
      # we can inspect $? and honor fail-on-error.
      run: |
        set +e
        node revoke-permit2-approval.js \
          --chainId "$CHAIN_ID" \
          --rpcUrl "$RPC_URL" \
          ${TOKEN_ADDRESS:+--tokenAddress "$TOKEN_ADDRESS"} \
          ${MIN_PRIORITY_FEE_GWEI:+--minPriorityFeeGwei "$MIN_PRIORITY_FEE_GWEI"}
        status=$?
        if [ "$status" -ne 0 ] && [ "$FAIL_ON_ERROR" = "false" ]; then
          echo "::warning::Permit2 allowance reset failed (exit $status); continuing (fail-on-error=false)."
          exit 0
        fi
        exit "$status"
